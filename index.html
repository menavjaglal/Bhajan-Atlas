<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SSSGCSA Bhajan Library</title>

  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo-section">
      <img src="logo.png" alt="SSSGCSA Logo" class="logo"/>
      <h2>SSSGCSA</h2>
      <p>Sri Sathya Sai Global Council<br/>South Africa</p>
    </div>

    <div class="menu">
      <div class="menu-item active">Browse Bhajans</div>
      <div class="menu-item">About</div>
      <div class="menu-item">Contact</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <h1>Bhajan Library</h1>
      <input id="search" type="text" placeholder="Search bhajans..."/>
    </div>

    <div class="content">

      <!-- LEFT LIST -->
      <div class="list" id="bhajanList"></div>

      <!-- RIGHT DETAIL -->
      <div class="detail" id="bhajanDetail">
        <h2>Select a bhajan</h2>
        <p>Click on a bhajan to view details</p>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
