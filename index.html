<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhajan Search</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="app">

  <!-- HOME VIEW -->
  <div class="home" id="homeView">
    <h1>Sai Bhajan Library</h1>

    <input id="searchBox" type="text" placeholder="Search bhajans..." />
    <button onclick="searchBhajans()">Search</button>

    <p class="hint">Try: Sai, Baba, Om, Rama</p>
  </div>

  <!-- RESULTS VIEW -->
  <div class="results hidden" id="resultsView"></div>

  <!-- DETAIL VIEW -->
  <div class="detail hidden" id="detailView"></div>

</div>

<script src="script.js"></script>
</body>
</html>
